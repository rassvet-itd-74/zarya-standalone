<!doctype html>
<html data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Zarya</title>
    <link rel="icon" href="/src/assets/icons/favicon.ico" />
  </head>
  <body>
    <!-- Theme toggle slider (Tailwind utilities for layout, SCSS for mechanism) -->
    <label for="theme-checkbox" class="fixed top-4 left-4 flex cursor-pointer items-center gap-1.5 text-sm select-none opacity-60 hover:opacity-100 transition-opacity">
      <input type="checkbox" id="theme-checkbox" class="theme-toggle__input" />
      <span class="theme-toggle__track">
        <span class="theme-toggle__thumb"></span>
      </span>
    </label>
    <button id="lang-toggle" class="lang-toggle">EN</button>
    <div id="app">
      <img id="app-logo" class="app-logo" src="" alt="Zarya" />

      <!-- Shown when no keystore exists yet -->
      <div id="setup-view" class="view setup-form" style="display:none">
        <h2 class="setup-form__title">Create wallet</h2>
        <p class="setup-form__description">Choose a password to encrypt your private key. It cannot be recovered if lost.</p>
        <div class="field">
          <label class="field__label" for="create-password">Password</label>
          <input class="field__input" type="password" id="create-password" autocomplete="new-password" />
        </div>
        <div class="field">
          <label class="field__label" for="create-confirm">Confirm password</label>
          <input class="field__input" type="password" id="create-confirm" autocomplete="new-password" />
        </div>
        <button class="btn" id="create-btn">Generate key</button>
        <p id="create-error" class="setup-form__error"></p>
      </div>

      <!-- Shown when a keystore already exists -->
      <div id="unlock-view" class="view unlock-form" style="display:none">
        <h2 class="unlock-form__title">Unlock wallet</h2>
        <div class="field">
          <label class="field__label" for="unlock-password">Password</label>
          <input class="field__input" type="password" id="unlock-password" autocomplete="current-password" />
        </div>
        <button class="btn" id="unlock-btn">Unlock</button>
        <p id="unlock-error" class="unlock-form__error"></p>
        <button class="btn btn--ghost" id="import-btn">Import keystore</button>
        <p id="import-status" class="unlock-form__status"></p>
      </div>

      <!-- Shown after the key is unlocked / created -->
      <div id="wallet-view" class="view wallet" style="display:none">
        <h2 class="wallet__title">Wallet</h2>
        <p class="wallet__label">Address</p>
        <code id="address" class="wallet__address"></code>
        <div class="wallet__actions">
          <button class="btn btn--outline" id="export-btn">Export keystore</button>
          <button class="btn btn--ghost" id="settings-open-btn">Settings</button>
        </div>
        <p id="export-status" class="wallet__status"></p>
      </div>

      <!-- Network / DAO settings -->
      <div id="settings-view" class="view settings-form" style="display:none">
        <h2 class="settings-form__title">Network Settings</h2>
        <div class="field">
          <label class="field__label" for="contract-address">Contract Address</label>
          <input class="field__input" type="text" id="contract-address" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label class="field__label" for="chain-id">Chain ID</label>
          <input class="field__input" type="number" id="chain-id" min="1" />
        </div>
        <div class="settings-form__actions">
          <button class="btn btn--ghost" id="settings-test-btn">Test Connection</button>
          <button class="btn" id="settings-save-btn">Save</button>
        </div>
        <p id="settings-status" class="settings-form__status"></p>
        <button class="btn btn--ghost settings-form__back" id="settings-back-btn">&#8592; Back</button>
      </div>

    </div>
    <footer class="app-footer">
      <span id="app-city"></span> &middot; <span id="app-dev-credit"></span>
    </footer>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
