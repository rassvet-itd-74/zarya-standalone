<!doctype html>
<html data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Zarya</title>
    <link rel="icon" href="/src/assets/icons/favicon.ico" />
  </head>
  <body>
    <!-- Theme toggle slider (Tailwind utilities for layout, SCSS for mechanism) -->
    <label for="theme-checkbox" class="fixed top-4 left-4 flex cursor-pointer items-center gap-1.5 text-sm select-none opacity-60 hover:opacity-100 transition-opacity">
      <input type="checkbox" id="theme-checkbox" class="theme-toggle__input" />
      <span class="theme-toggle__track">
        <span class="theme-toggle__thumb"></span>
      </span>
    </label>
    <button id="lang-toggle" class="lang-toggle">EN</button>
    <div id="app">
      <div id="rpc-banner" class="rpc-banner" style="display:none" id="rpc-banner-text">&#9888; RPC offline — read-only mode</div>
      <img id="app-logo" class="app-logo" src="" alt="Zarya" />

      <!-- Shown when no keystore exists yet -->
      <div id="setup-view" class="view setup-form" style="display:none">
        <h2 class="setup-form__title">Create wallet</h2>
        <p class="setup-form__description">Choose a password to encrypt your private key. It cannot be recovered if lost.</p>
        <div class="field">
          <label class="field__label" for="create-password">Password</label>
          <input class="field__input" type="password" id="create-password" autocomplete="new-password" />
        </div>
        <div class="field">
          <label class="field__label" for="create-confirm">Confirm password</label>
          <input class="field__input" type="password" id="create-confirm" autocomplete="new-password" />
        </div>
        <button class="btn" id="create-btn">Generate key</button>
        <p id="create-error" class="setup-form__error"></p>
      </div>

      <!-- Shown when a keystore already exists -->
      <div id="unlock-view" class="view unlock-form" style="display:none">
        <h2 class="unlock-form__title">Unlock wallet</h2>
        <div class="field">
          <label class="field__label" for="unlock-password">Password</label>
          <input class="field__input" type="password" id="unlock-password" autocomplete="current-password" />
        </div>
        <button class="btn" id="unlock-btn">Unlock</button>
        <p id="unlock-error" class="unlock-form__error"></p>
        <button class="btn btn--ghost" id="import-btn">Import keystore</button>
        <p id="import-status" class="unlock-form__status"></p>
      </div>

      <!-- Shown after the key is unlocked / created -->
      <div id="wallet-view" class="view wallet" style="display:none">
        <h2 class="wallet__title">Wallet</h2>
        <p class="wallet__label">Address</p>
        <code id="address" class="wallet__address"></code>
        <div class="wallet__actions">
          <button class="btn btn--outline" id="export-btn">Export keystore</button>
          <button class="btn btn--ghost" id="settings-open-btn">Settings</button>
          <button class="btn btn--ghost" id="wallet-back-btn">&#8592; Dashboard</button>
        </div>
        <p id="export-status" class="wallet__status"></p>
      </div>

      <!-- Dashboard — shown after unlock when config exists -->
      <div id="dashboard-view" class="view dashboard" style="display:none">
        <div class="dashboard__header">
          <h2 class="dashboard__title" id="dash-title">Dashboard</h2>
          <span class="dashboard__chain-badge" id="dashboard-chain-id"></span>
        </div>
        <div class="dashboard__address-block">
          <span class="dashboard__label" id="dash-address-label">Address</span>
          <code id="dashboard-address" class="dashboard__address"></code>
        </div>
        <div class="dashboard__address-block">
          <span class="dashboard__label" id="dash-balance-label">Balance</span>
          <span id="dashboard-balance" class="dashboard__balance">…</span>
        </div>
        <p id="dashboard-block" class="dashboard__muted"></p>
        <div class="dashboard__section">
          <div class="dashboard__organs-header">
            <span class="dashboard__label" id="dash-organs-label">Organs</span>
            <div class="dashboard__organs-actions">
              <button class="btn btn--ghost btn--xs" id="dash-organs-export">&#8593;</button>
              <button class="btn btn--ghost btn--xs" id="dash-organs-import">&#8595;</button>
            </div>
          </div>
          <div id="dashboard-organs" class="dashboard__organs"></div>
          <div class="dashboard__organs-add">
            <input class="field__input field__input--sm" type="text" id="organ-code-input"
              spellcheck="false" autocomplete="off" />
            <button class="btn btn--sm" id="dash-organ-add-btn">+</button>
          </div>
        </div>
        <div class="dashboard__section dashboard__section--row">
          <span class="dashboard__label" id="dash-votings-label">Active Votings</span>
          <span id="dashboard-votings-count" class="dashboard__count-badge">—</span>
        </div>
        <div class="dashboard__nav">
          <button class="btn" id="dash-votings-btn">Votings</button>
          <button class="btn btn--outline" id="dash-matrix-btn">Matrix</button>
          <button class="btn btn--ghost" id="dash-settings-btn">Settings</button>
          <button class="btn btn--ghost" id="dash-wallet-btn">Wallet</button>
        </div>
      </div>

      <!-- Votings -->
      <div id="votings-view" class="view votings" style="display:none">
        <div class="votings__header">
          <button class="btn btn--ghost btn--sm" id="votings-back-btn">← Back</button>
          <h2 class="votings__title" id="votings-title">Votings</h2>
          <div class="votings__header-actions">
            <button class="btn btn--sm" id="votings-create-btn">+ Create</button>
            <button class="btn btn--ghost btn--sm" id="votings-refresh-btn">⟳</button>
          </div>
        </div>
        <div class="votings__tabs" role="tablist">
          <button class="votings__tab votings__tab--active" id="votings-tab-active" role="tab">Active</button>
          <button class="votings__tab" id="votings-tab-past" role="tab">Past</button>
        </div>
        <div id="votings-list" class="votings__list"></div>
        <div id="cast-vote-panel" class="cast-vote-panel" style="display:none">
          <p id="cast-vote-label" class="cast-vote-panel__label"></p>
          <div class="cast-vote-panel__support">
            <button class="btn btn--sm" id="cast-for-btn">For</button>
            <button class="btn btn--sm btn--outline" id="cast-against-btn">Against</button>
          </div>
          <select class="field__input field__input--sm" id="cast-organ-select"></select>
          <div class="cast-vote-panel__actions">
            <button class="btn btn--sm" id="cast-confirm-btn">Confirm</button>
            <button class="btn btn--ghost btn--sm" id="cast-cancel-btn">Cancel</button>
          </div>
          <p id="cast-status" class="cast-vote-panel__status"></p>
        </div>
      </div>

      <!-- Matrix browser -->
      <div id="matrix-view" class="view matrix" style="display:none">
        <div class="matrix__header">
          <button class="btn btn--ghost btn--sm" id="matrix-back-btn">← Dashboard</button>
          <h2 class="matrix__title" id="matrix-title">Matrix</h2>
          <button class="btn btn--ghost btn--sm" id="matrix-refresh-btn">⟳</button>
        </div>
        <div class="matrix__tabs" role="tablist">
          <button class="matrix__tab matrix__tab--active" id="matrix-tab-numerical" role="tab">S_X</button>
          <button class="matrix__tab" id="matrix-tab-categorical" role="tab">S_Y</button>
        </div>
        <p id="matrix-loading" class="matrix__loading"></p>
        <div id="matrix-table-wrap" class="matrix__table-wrap" style="display:none">
          <table id="matrix-table" class="matrix__table"></table>
        </div>
      </div>

      <!-- Cell detail -->
      <div id="cell-detail-view" class="view cell-detail" style="display:none">
        <div class="cell-detail__header">
          <button class="btn btn--ghost btn--sm" id="cell-back-btn">← Matrix</button>
          <h2 class="cell-detail__title" id="cell-title"></h2>
        </div>
        <div id="cell-organ" class="cell-detail__organ"></div>
        <div id="cell-aggregation" class="cell-detail__aggregation"></div>
        <div id="cell-history" class="cell-detail__history"></div>
        <div class="cell-detail__actions">
          <button class="btn btn--sm btn--outline" id="cell-load-more-btn" style="display:none">Load more</button>
          <button class="btn btn--sm" id="cell-propose-btn">Propose Value</button>
        </div>
      </div>

      <!-- Create voting -->
      <div id="create-voting-view" class="view create-voting" style="display:none">
        <div class="create-voting__header">
          <button class="btn btn--ghost btn--sm" id="cv-back-btn">← Back</button>
          <h2 class="create-voting__title" id="cv-title">Create Voting</h2>
        </div>

        <!-- Step 1: voting type -->
        <div id="cv-step-type" class="cv-step">
          <p class="cv-step__label" id="cv-type-label">Voting type</p>
          <div id="cv-type-list" class="cv-type-list"></div>
        </div>

        <!-- Step 2: organ (hidden for Theme/Statement) -->
        <div id="cv-step-organ" class="cv-step" style="display:none">
          <p class="cv-step__label" id="cv-organ-label">Organ</p>
          <div class="cv-organ-picker">
            <select class="field__input field__input--sm" id="cv-organ-type-sel"></select>
            <select class="field__input field__input--sm" id="cv-organ-region-sel"></select>
            <input  class="field__input field__input--sm" type="number" min="0" id="cv-organ-number" value="0" />
            <button class="btn btn--sm btn--outline" id="cv-organ-resolve-btn"></button>
          </div>
          <p id="cv-organ-resolved" class="cv-organ-resolved"></p>
        </div>

        <!-- Step 3: contextual fields -->
        <div id="cv-step-fields" class="cv-step" style="display:none">

          <!-- isCategorical (Theme / Statement only) -->
          <div id="cv-field-is-categorical" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-is-categorical">Matrix type</label>
            <label class="cv-toggle">
              <input type="checkbox" id="cv-is-categorical" />
              <span id="cv-is-categorical-label"></span>
            </label>
          </div>

          <!-- x coordinate -->
          <div id="cv-field-x" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-x">Theme (x)</label>
            <input class="field__input field__input--sm" type="number" min="0" id="cv-x" value="0" />
          </div>

          <!-- y coordinate -->
          <div id="cv-field-y" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-y">Statement (y)</label>
            <input class="field__input field__input--sm" type="number" min="0" id="cv-y" value="0" />
          </div>

          <!-- numerical/categorical value -->
          <div id="cv-field-value" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-value">Value</label>
            <input class="field__input field__input--sm" type="number" min="0" id="cv-value" value="0" />
          </div>

          <!-- value author -->
          <div id="cv-field-value-author" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-value-author">Value author</label>
            <input class="field__input field__input--sm" type="text" id="cv-value-author" autocomplete="off" spellcheck="false" />
          </div>

          <!-- category id -->
          <div id="cv-field-category" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-category">Category ID</label>
            <input class="field__input field__input--sm" type="number" min="0" id="cv-category" value="0" />
          </div>

          <!-- category name -->
          <div id="cv-field-category-name" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-category-name">Category name</label>
            <input class="field__input field__input--sm" type="text" id="cv-category-name" />
          </div>

          <!-- decimals -->
          <div id="cv-field-decimals" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-decimals">Decimals</label>
            <input class="field__input field__input--sm" type="number" min="0" max="18" id="cv-decimals" value="2" />
          </div>

          <!-- member address (membership) -->
          <div id="cv-field-member" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-member">Member address</label>
            <input class="field__input field__input--sm" type="text" id="cv-member" autocomplete="off" spellcheck="false" />
          </div>

          <!-- theme name -->
          <div id="cv-field-theme" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-theme">Theme name</label>
            <input class="field__input field__input--sm" type="text" id="cv-theme" />
          </div>

          <!-- statement text -->
          <div id="cv-field-statement" class="cv-field-row" style="display:none">
            <label class="cv-field-row__label" id="cv-label-statement">Statement</label>
            <input class="field__input field__input--sm" type="text" id="cv-statement" />
          </div>

          <!-- duration -->
          <div id="cv-field-duration" class="cv-field-row">
            <label class="cv-field-row__label" id="cv-label-duration">Duration</label>
            <input class="field__input field__input--sm" type="number" min="1" id="cv-duration" value="7" style="width:5rem;flex:none" />
            <select class="field__input field__input--sm" id="cv-duration-unit" style="width:auto;flex:none">
              <option value="minutes" id="cv-unit-minutes">min</option>
              <option value="hours"   id="cv-unit-hours">h</option>
              <option value="days"    id="cv-unit-days" selected>days</option>
              <option value="months"  id="cv-unit-months">mo</option>
            </select>
          </div>
        </div>

        <div class="create-voting__actions" id="cv-actions" style="display:none">
          <button class="btn" id="cv-submit-btn">Submit</button>
          <p id="cv-status" class="create-voting__status"></p>
        </div>
      </div>

      <!-- Network / DAO settings -->
      <div id="settings-view" class="view settings-form" style="display:none">
        <h2 class="settings-form__title">Network Settings</h2>
        <div class="field">
          <label class="field__label" for="contract-address">Contract Address</label>
          <input class="field__input" type="text" id="contract-address" autocomplete="off" spellcheck="false" />
        </div>
        <div class="field">
          <label class="field__label" for="chain-id">Chain ID</label>
          <input class="field__input" type="number" id="chain-id" min="1" />
        </div>
        <div class="settings-form__actions">
          <button class="btn btn--ghost" id="settings-test-btn">Test Connection</button>
          <button class="btn" id="settings-save-btn">Save</button>
        </div>
        <p id="settings-status" class="settings-form__status"></p>
        <button class="btn btn--ghost settings-form__back" id="settings-back-btn">&#8592; Back</button>
      </div>

    </div>
    <footer class="app-footer">
      <span id="app-city"></span> &middot; <span id="app-dev-credit"></span>
    </footer>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
